@if (cours && dto) {
  <p-panel>
    <ng-template #header>
      <h2>
        <span class="pi" [class]="cours!.iconeVariation()"></span>
        {{
          'COMPOSANTS.PORTEFEUILLES.DETAILS_VALEUR.DETAILS_VALEUR'
            | translate: {
            valeur: cours.libelle,
            ticker: cours.ticker,
            marche: `ENUMERATIONS.MARCHE.${dto.coursPortefeuille.marche}` | translate
          }
        }}
        <app-colonne-alertes [alertes]="alertes"></app-colonne-alertes>
      </h2>
      <span class="pi" [ngClass]="{'pi-caret-left': !dto.premier, 'pi-ban': dto.premier}"
            (click)="this.precedent.emit()"
            title="{{ 'COMPOSANTS.COURS.DETAILS_VALEUR.VALEUR_PRECEDENTE' | translate}}"></span>
      <span class="pi" [ngClass]="{'pi-caret-right': !dto.dernier, 'pi-ban': dto.dernier}"
            (click)="this.suivant.emit()"
            title="{{ 'COMPOSANTS.COURS.DETAILS_VALEUR.VALEUR_SUIVANTE' | translate}}"></span>
      <span class="lien-bandeau" (click)="abcBourse()"
            title="{{ 'COMPOSANTS.PORTEFEUILLES.DETAILS_VALEUR.ABCBOURSE' | translate}}">A</span>
      <span class="lien-bandeau" (click)="boursorama()"
            title="{{ 'COMPOSANTS.PORTEFEUILLES.DETAILS_VALEUR.BOURSORAMA' | translate}}">B</span>
      <span class="pi" [ngClass]="{'pi-chart-line': informationsDetaillees, 'pi-info-circle': !informationsDetaillees}"
            (click)="informationsDetaillees = !informationsDetaillees"
            title="{{
          (informationsDetaillees ? 'COMPOSANTS.PORTEFEUILLES.DETAILS_VALEUR.COURBES' : 'COMPOSANTS.PORTEFEUILLES.DETAILS_VALEUR.INFORMATIONS_DETAILLEES')
            | translate : {
            valeur: cours.libelle,
            ticker: cours.ticker,
            marche: `ENUMERATIONS.MARCHE.${dto.coursPortefeuille.marche}` | translate
          }
        }}"></span>
      <span class="pi pi-times-circle" (click)="this.ferme.emit()"></span>
    </ng-template>
    @if (informationsDetaillees) {
      <app-informations-ticker [cours]="cours"></app-informations-ticker>
    } @else {
      <app-charts [cours]="cours"></app-charts>
    }
  </p-panel>
}
